<div class="card">
  <div class="card-header">Add Course</div>
  <div class="card-body">
    <form #courseForm="ngForm" (ngSubmit)="addCourse(courseForm)">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" class="form-control" placeholder="Enter title here" id="title" name="title" #title="ngModel" [(ngModel)]="model.title" required />
        @if(title.invalid && title.touched){
          <div class="text-danger">Title is required</div>
        }

      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="3" placeholder="Enter Description" id="description" name="description" #description="ngModel" [(ngModel)]="model.description" required></textarea>
        @if(description.invalid && description.touched){
          <div class="text-danger">Description is required</div>
        }
      </div>
      <div class="mb-3">
        <label class="form-label">Image</label>
        <input type="file" class="form-control" id="image" name="image" accept="image/*" [multiple]="false" #image="ngModel" [(ngModel)]="model.image" (change)="onFileSelected($event)" required />
      </div>
      @if(cover){
        <div class="mb-3">
          <img [src]="cover" alt="Course Image" class="img-thumbnail" style="max-width: 200px;" />
        </div>
      }
       <div class="mb-3 text-center">
        <button class="btn btn-primary" type="submit">Submit</button>
       </div>
    </form>
  </div>
</div>
